<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, onSnapshot, setDoc, writeBatch, serverTimestamp, query, where, getDocs, runTransaction } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { Search, ChevronRight, MessageCircle, Truck, CheckCircle2, AlertTriangle, Calendar, Loader2, Package, Gift, CreditCard, Copy, MapPin, User, Phone, Store, Save, ArrowLeft, ArrowRight, ShoppingCart, ShoppingBag, Tag, Plus, Minus, X, Check, Send } from 'lucide-react';

        // ─── Firebase 設定 (與賣家端一致) ──────────────────────────────
        const firebaseConfig = {
          apiKey: "AIzaSyC_jnmyxI0XR0df2HPJJMztgnGfUWp4TOE",
          authDomain: "fann-beauty-erp.firebaseapp.com",
          projectId: "fann-beauty-erp",
          storageBucket: "fann-beauty-erp.firebasestorage.app",
          messagingSenderId: "554217440323",
          appId: "1:554217440323:web:c589d835093fc2263480f6",
          measurementId: "G-TKYVXJCW36"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'fann-beauty-production-v1'; 
        // ✅ v4.3: 動態運費改由 storeConfig.shippingFee 提供（移除寫死 SHIPPING_FEE）
        // ✅ 官方 LINE ID
        const LINE_OA_ID = "533krnmt";

        // ─── LINE Login（客人綁定登入，讓賣家看得到真實身份）──────────
        // ✅ LINE Login 頻道（Web app），採 Authorization Code + PKCE，不需要 Channel Secret
        const LINE_LOGIN_CHANNEL_ID = '2008448504';
        const LINE_LOGIN_REDIRECT_URI = 'https://fannbeauty.vercel.app/';
        const LINE_LAST_CODE_KEY = 'fann-line-last-code'; // 防止 LINE 轉址過程中同一組 code 被兩個分頁/情境重複處理
        const LINE_BIND_BONUS_AMOUNT = 50; // ✅ 首次綁定 LINE 贈送的購物金，改這個數字就能調整金額（設 0 就不送）

        const base64UrlEncode = (buffer) => {
            return btoa(String.fromCharCode(...new Uint8Array(buffer)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        };
        const generateRandomString = (length = 64) => {
            const arr = new Uint8Array(length);
            crypto.getRandomValues(arr);
            return base64UrlEncode(arr.buffer).slice(0, length);
        };
        const sha256Buffer = async (text) => {
            return await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
        };
        const decodeJwtPayload = (token) => {
            const payload = token.split('.')[1];
            const json = decodeURIComponent(
                atob(payload.replace(/-/g, '+').replace(/_/g, '/'))
                    .split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
            );
            return JSON.parse(json);
        };
        // 導向 LINE 登入頁（PKCE，全部在前端完成，不需要後端密鑰）
        // ✅ verifier 直接包進 state 帶著走，不存 localStorage：
        // Safari 的防追蹤機制常把「本站 → LINE → 本站」這種轉址往返
        // 判定成 bounce tracking，回來時會把本站剛寫入的 localStorage 清空，
        // 造成登入每次都驗證失敗。state 是 LINE 轉址回來時原封不動帶回的參數，
        // 不受這個機制影響，所以改成從 state 直接還原 verifier。
        const startLineLogin = async () => {
            const verifier = generateRandomString(64);
            const challenge = base64UrlEncode(await sha256Buffer(verifier));
            const state = verifier + '.' + generateRandomString(16);
            const params = new URLSearchParams({
                response_type: 'code',
                client_id: LINE_LOGIN_CHANNEL_ID,
                redirect_uri: LINE_LOGIN_REDIRECT_URI,
                state,
                scope: 'profile openid',
                code_challenge: challenge,
                code_challenge_method: 'S256'
            });
            window.location.href = `https://access.line.me/oauth2/v2.1/authorize?${params.toString()}`;
        };
        // 用 code 換 token（PKCE 公開客戶端，不需要 client_secret）
        const exchangeLineToken = async (code, verifier) => {
            const body = new URLSearchParams({
                grant_type: 'authorization_code',
                code,
                redirect_uri: LINE_LOGIN_REDIRECT_URI,
                client_id: LINE_LOGIN_CHANNEL_ID,
                code_verifier: verifier
            });
            const res = await fetch('https://api.line.me/oauth2/v2.1/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body
            });
            if (!res.ok) throw new Error('LINE token exchange failed: ' + res.status);
            return res.json();
        };

        // ─── 工具函式 ──────────────────────────────────────────────────
        const formatDate = (dateObj) => {
            if (!dateObj) return '';
            const d = dateObj.seconds ? new Date(dateObj.seconds * 1000) : new Date(dateObj);
            return `${d.getMonth() + 1}/${d.getDate()}`;
        };

        // ✅ Bug修復：與賣家端完全一致的計算邏輯
        function getBundlePrice(qty, priceStr) {
            if (!priceStr || qty <= 0) return 0;
            const tiers = String(priceStr).split('/').map(s => Number(s.trim()));
            if (tiers.length === 1) return (tiers[0] || 0) * qty;
            let remainingQty = qty;
            let total = 0;
            for (let size = tiers.length; size >= 1; size--) {
                const bundlePrice = tiers[size - 1];
                if (bundlePrice > 0 && remainingQty >= size) {
                    const count = Math.floor(remainingQty / size);
                    total += count * bundlePrice;
                    remainingQty %= size;
                }
            }
            // fallback 到單價
            if (remainingQty > 0 && tiers[0] > 0) total += remainingQty * tiers[0];
            return total;
        }

        // ─── 選購頁工具函式 ───────────────────────────────────────────
        const productsCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'shopProducts');
        const ordersCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'orders');
        const parseOptions = (str) => String(str || '').split(/[\/,、]/).map(s => s.trim()).filter(Boolean);
        // ✅ 商品排序：跟後台手動排序一致（sortOrder 越小越前面），沒排過的舊商品用建立時間換算
        const getProductOrder = (p) => p.sortOrder != null ? p.sortOrder : -(p.createdAt || 0);
        // ✅ 把客人綁定的 LINE 身份存進 customerProfiles，讓賣家後台看得到真實身份
        // 如果是這個名字「第一次」綁定 LINE（之前沒有 lineUserId），額外贈送一筆購物金當歡迎禮
        const linkLineProfile = async (name, profile) => {
            if (!name || !name.trim() || !profile) return { bonusGranted: false, amount: 0 };
            const trimmedName = name.trim();
            try {
                const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'customerProfiles', trimmedName);
                const creditRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeCredits', trimmedName);
                let bonusGranted = false;
                await runTransaction(db, async (tx) => {
                    // ✅ Firestore 交易規定：所有 read 要先做完才能開始 write
                    const profileSnap = await tx.get(profileRef);
                    const isFirstBind = !(profileSnap.exists() && profileSnap.data().lineUserId);
                    const shouldGrantBonus = isFirstBind && LINE_BIND_BONUS_AMOUNT > 0;
                    const creditSnap = shouldGrantBonus ? await tx.get(creditRef) : null;

                    tx.set(profileRef, {
                        lineUserId: profile.userId || '',
                        lineDisplayName: profile.displayName || '',
                        linePictureUrl: profile.pictureUrl || '',
                        lineLinkedAt: new Date().toISOString()
                    }, { merge: true });

                    if (shouldGrantBonus) {
                        const currentBalance = creditSnap.exists() ? (creditSnap.data().balance || 0) : 0;
                        const currentHistory = creditSnap.exists() ? (creditSnap.data().history || []) : [];
                        const newBalance = currentBalance + LINE_BIND_BONUS_AMOUNT;
                        tx.set(creditRef, {
                            balance: newBalance,
                            history: [...currentHistory, {
                                time: new Date().toISOString(), amount: LINE_BIND_BONUS_AMOUNT,
                                note: '首次綁定 LINE 贈送', balanceAfter: newBalance
                            }].slice(-50)
                        });
                        bonusGranted = true;
                    }
                });
                return { bonusGranted, amount: LINE_BIND_BONUS_AMOUNT };
            } catch (err) {
                console.error('LINE profile link error:', err);
                return { bonusGranted: false, amount: 0 };
            }
        };

        // ─── 主元件 ──────────────────────────────────────────────────
        const App = () => {
          const _urlName = (() => {
              try { return (new URLSearchParams(window.location.search).get('name') || '').trim(); }
              catch { return ''; }
          })();
          // ✅ 商品深連結 ?product=xxx
          const _urlProduct = (() => {
              try { return (new URLSearchParams(window.location.search).get('product') || '').trim(); }
              catch { return ''; }
          })();
          // ✅ 紅包連結 ?redpacket=xxx
          const _urlRedPacket = (() => {
              try { return (new URLSearchParams(window.location.search).get('redpacket') || '').trim(); }
              catch { return ''; }
          })();
          const NAME_KEY = 'fann-shop-name';
          // ✅ 記住登入：關掉瀏覽器重開，只要之前登入過就自動帶入名字，不用重新輸入/重新 LINE 登入
          const _savedName = (() => {
              try { return (localStorage.getItem(NAME_KEY) || '').trim(); }
              catch { return ''; }
          })();
          const [user, setUser] = useState(null);
          const [isLoggedIn, setIsLoggedIn] = useState(!!_urlName || !!_savedName);
          const [searchName, setSearchName] = useState(_urlName || _savedName);
          const [orders, setOrders] = useState([]);
          const [archivedOrders, setArchivedOrders] = useState([]); // ✅ 新增：歷史歸檔
          const [storeConfig, setStoreConfig] = useState({ myshipUrl: '', freeShippingThreshold: 1500, shippingFee: 38 });
          const [storeCredits, setStoreCredits] = useState({}); // 購物金
          const [priceBook, setPriceBook] = useState({}); // 品名用
          const [promotion, setPromotion] = useState(null); // ✅ 促銷活動
          const [dataLoaded, setDataLoaded] = useState(false);
          const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
          const toastTimer = useRef(null);
          // ✅ 新增：寄件資訊
          const [shippingProfile, setShippingProfile] = useState({ receiverName: '', phone: '', store: '' });
          const [savingProfile, setSavingProfile] = useState(false);
          const [showBankInfo, setShowBankInfo] = useState(false); // 控制匯款資訊摺疊
          // ✅ 新增：付款流程頁面控制
          const [currentPage, setCurrentPage] = useState('order'); // order / bank

          // ═══ 選購頁 state ═══
          const [tab, setTab] = useState('shop'); // shop / orders — 主分頁
          // ✅ 開場選單：完全沒有帶任何連結參數、也還沒登入過的訪客，先看選單（新品上市／會員綁定／查看訂單）
          // 再決定要幹嘛，避免一開始就直接丟進選購頁、綁定 LINE 按鈕又擋到 Logo
          const [showHomeMenu, setShowHomeMenu] = useState(!_urlName && !_urlRedPacket && !_urlProduct && !_savedName);
          const [browseMode, setBrowseMode] = useState(!_urlName && !_urlRedPacket && (!!_savedName || !!_urlProduct)); // ✅ 預設先看商品，有帶名字/紅包連結才直接進登入流程；全新訪客改由開場選單決定
          // ✅ v5.6: 紅包活動
          const [redPacketData, setRedPacketData] = useState(null);
          const [redPacketLoaded, setRedPacketLoaded] = useState(!_urlRedPacket);
          const [redPacketClaiming, setRedPacketClaiming] = useState(false);
          const [redPacketResult, setRedPacketResult] = useState(null); // { amount } after claiming (or already-claimed lookup)
          const [deepLinkDone, setDeepLinkDone] = useState(false);
          const [pendingAdd, setPendingAdd] = useState(null); // 未登入時想加入的商品，登入後補加
          const [justOrdered, setJustOrdered] = useState(null); // ✅ 剛下單的摘要，用於「通知賣家」橫幅
          const [wantOrders, setWantOrders] = useState(false); // ✅ 未登入點「我的訂單」→ 登入後自動切過去
          const [products, setProducts] = useState([]);
          const [productsLoaded, setProductsLoaded] = useState(false);
          const [cart, setCart] = useState({}); // { productId__spec: {product, spec, qty} }
          const [showConfirm, setShowConfirm] = useState(false);
          const [submitting, setSubmitting] = useState(false);
          const [activeCat, setActiveCat] = useState('全部');
          const [shopSearch, setShopSearch] = useState('');
          const [detailProduct, setDetailProduct] = useState(null);
          const [detailImgIdx, setDetailImgIdx] = useState(0); // ✅ 多張商品照片：目前滑到第幾張
          const detailScrollRef = useRef(null);
          useEffect(() => {
              setDetailImgIdx(0);
              if (detailScrollRef.current) detailScrollRef.current.scrollLeft = 0;
          }, [detailProduct?.id]);
          const [specModal, setSpecModal] = useState(null);
          const [pickSize, setPickSize] = useState('');
          const [pickColor, setPickColor] = useState('');
          // ✅ LINE 登入綁定後的個人資料（userId / displayName / pictureUrl）
          const [lineProfile, setLineProfile] = useState(null);

          // ✅ 取得商品品名（相容新舊格式，沒填返空字串）
          const getProductName = (code) => {
              const entry = priceBook[code];
              if (entry == null || typeof entry !== 'object') return '';
              return String(entry.name || '').trim();
          };

          // ✅ 促銷計算（與賣家端邏輯相同）
          const isPromoActive = (promo) => {
              if (!promo || !promo.enabled) return false;
              const now = new Date();
              if (promo.startAt && new Date(promo.startAt) > now) return false;
              if (promo.endAt   && new Date(promo.endAt)   < now) return false;
              return true;
          };
          // ✅ 白名單過濾：取得參與優惠的品項小計和數量
          const getEligible = (promo, codeGroups) => {
              let subtotal = 0; let qty = 0;
              const useWL = promo.itemFilter === 'whitelist' && Array.isArray(promo.whitelist) && promo.whitelist.length > 0;
              Object.entries(codeGroups).forEach(([code, cg]) => {
                  if (useWL && !promo.whitelist.includes(code)) return;
                  subtotal += (cg.subtotal || 0);
                  qty += (cg.totalQty || 0);
              });
              return { subtotal, qty };
          };
          // ✅ 折扣計算（傳入 codeGroups，做白名單過濾）
          const calcDiscount = (promo, codeGroups, locked = false) => {
              if (!locked && !isPromoActive(promo)) return 0;
              const { subtotal: eTotal, qty: eQty } = getEligible(promo, codeGroups);
              if (eTotal === 0) return 0;
              switch (promo.type) {
                  case 'fixed':
                      return Math.min((Number(promo.value) || 0) * eQty, eTotal);
                  case 'percent': {
                      const pct = Number(promo.percent) || 100;
                      return Math.round(eTotal * (100 - pct) / 100);
                  }
                  case 'threshold':
                      return eTotal >= (Number(promo.threshold) || 0)
                          ? (Number(promo.thresholdDiscount) || 0) : 0;
                  default: return 0;
              }
          };

          const showMessage = (msg, type = 'success') => {
              if (toastTimer.current) clearTimeout(toastTimer.current);
              setToast({ show: true, msg, type });
              toastTimer.current = setTimeout(() => setToast(t => ({ ...t, show: false })), 3000);
          };

          // Firebase 匿名登入
          useEffect(() => {
            signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
            const unsubscribe = onAuthStateChanged(auth, u => setUser(u));
            return () => unsubscribe();
          }, []);

          // ✅ LINE 登入回呼：頁面帶著 ?code=&state= 回來時，換 token 並解出個人資料
          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            if (!code || !state) return;
            // ✅ LINE 轉址過程中，同一組 code 有時會在不同分頁/情境被載入兩次
            // （例如 LINE App 內部先處理一次再交給 Safari）。第二次載入時
            // savedState/verifier 已經被第一次消耗掉，直接判定失敗會誤報，
            // 所以先用 code 本身擋掉重複執行，讓真正處理的那一次去顯示結果就好。
            if (localStorage.getItem(LINE_LAST_CODE_KEY) === code) {
                window.history.replaceState({}, '', window.location.origin + window.location.pathname);
                return;
            }
            localStorage.setItem(LINE_LAST_CODE_KEY, code);
            // 清掉網址上的 code/state，避免重新整理時重複觸發
            window.history.replaceState({}, '', window.location.origin + window.location.pathname);
            // ✅ verifier 直接從 state 拆出來（state 格式是 verifier + '.' + 隨機字串），
            // 不用再去讀 localStorage，繞過 Safari 轉址後清掉 localStorage 的問題
            const verifier = state.split('.')[0];
            if (!verifier || verifier.length < 32) {
                showMessage('LINE 登入驗證失敗，請重新登入', 'error');
                return;
            }
            (async () => {
                try {
                    const tokenRes = await exchangeLineToken(code, verifier);
                    const claims = decodeJwtPayload(tokenRes.id_token);
                    const profile = { userId: claims.sub, displayName: claims.name || '', pictureUrl: claims.picture || '' };

                    // ✅ 用 lineUserId 反查之前綁定過的暱稱：LINE 顯示名稱可能跟客人下單時用的暱稱不同，
                    // 若曾經綁定過，優先沿用舊暱稱，訂單歷史才不會因為改了 LINE 名字而斷開
                    let resolvedName = profile.displayName;
                    let matchedExisting = false;
                    try {
                        const q = query(
                            collection(db, 'artifacts', appId, 'public', 'data', 'customerProfiles'),
                            where('lineUserId', '==', profile.userId)
                        );
                        const snap = await getDocs(q);
                        if (!snap.empty) {
                            resolvedName = snap.docs[0].id;
                            matchedExisting = true;
                        }
                    } catch (lookupErr) { console.error('LINE profile lookup error:', lookupErr); }

                    setLineProfile({ ...profile, matchedExisting });
                    if (resolvedName) setSearchName(resolvedName);
                    setBrowseMode(false);
                    showMessage(
                        matchedExisting ? `歡迎回來，${resolvedName} 💚` : `LINE 登入成功！如果你之前用別的暱稱下過單，記得改成那個暱稱唷`,
                        matchedExisting ? 'success' : 'warn'
                    );
                } catch (err) {
                    console.error('LINE login error:', err);
                    showMessage('LINE 登入失敗，請再試一次', 'error');
                }
            })();
          }, []);

          // ✅ 統一的登入確認：手動輸入 or LINE 登入後確認名字，都會走這裡
          const confirmLogin = () => {
              if (!searchName.trim()) return;
              setIsLoggedIn(true);
              try { localStorage.setItem(NAME_KEY, searchName.trim()); } catch {}
              if (lineProfile) {
                  linkLineProfile(searchName.trim(), lineProfile).then(({ bonusGranted, amount }) => {

          // 雲端資料即時同步
          useEffect(() => {

            const unsubOrders = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), snap => {

            const unsubCredits = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'storeCredits'), snap => {

          // ✅ v5.6: 監聽紅包活動（?redpacket=xxx 進來才會抓）
          useEffect(() => {

          // ✅ 選購頁：監聽商品
          useEffect(() => {

            const unsub = onSnapshot(productsCol(), snap => {

          }, [user]);

          // ✅ 商品深連結：商品載入後自動開啟指定商品詳情
          useEffect(() => {
            if (deepLinkDone || !_urlProduct || !productsLoaded) return;
            const found = products.find(p => p.id === _urlProduct);
            if (found) { setDetailProduct(found); setDeepLinkDone(true); }
            else if (products.length > 0) { setDeepLinkDone(true); } // 找不到就作罷
          }, [products, productsLoaded, deepLinkDone]);

          // ✅ 登入後若有待加入商品（從商品連結免登入瀏覽時點的），自動繼續
          useEffect(() => {
            if (isLoggedIn && pendingAdd) {
                const p = pendingAdd;
                setPendingAdd(null);
                const sizes = parseOptions(p.sizes);
                const colors = parseOptions(p.colors);
                if (sizes.length === 0 && colors.length === 0) { addToCart(p, ''); }
                else { setPickSize(sizes.length ? '' : '_none'); setPickColor(colors.length ? '' : '_none'); setSpecModal({ product: p }); }
            }
          }, [isLoggedIn, pendingAdd]);

          // ✅ 未登入點「我的訂單」→ 登入後自動切到訂單分頁
          useEffect(() => {
            if (isLoggedIn && wantOrders) { setTab('orders'); setWantOrders(false); }
          }, [isLoggedIn, wantOrders]);

          // 點「我的訂單」：已登入直接切，未登入先要求名字
          const goOrders = () => {
            if (isLoggedIn) { setTab('orders'); }
            else { setWantOrders(true); setBrowseMode(false); }
          };
          const goShop = () => { setTab('shop'); };

          // ✅ 登入後載入該客人的寄件資訊
          useEffect(() => {
              if (!isLoggedIn || !searchName.trim() || !user) return;
              const trimmedName = searchName.trim();
              const unsub = onSnapshot(
                  doc(db, 'artifacts', appId, 'public', 'data', 'customerProfiles', trimmedName),
                  d => {
                      if (d.exists()) {
                          const data = d.data();
                          setShippingProfile({
                              receiverName: data.receiverName || '',
                              phone: data.phone || '',
                              store: data.store || ''
                          });
                          // ✅ 這個名字之前已經綁過 LINE 的話，帶回來顯示（不用重新登入 LINE 也看得到已綁定狀態）
                          if (data.lineUserId) {
                              setLineProfile(prev => prev || {
                                  userId: data.lineUserId,
                                  displayName: data.lineDisplayName || '',
                                  pictureUrl: data.linePictureUrl || '',
                                  matchedExisting: true
                              });
                          }
                      } else {
                          setShippingProfile({ receiverName: '', phone: '', store: '' });
                      }
                  },
                  err => console.error("Profile load error:", err)
              );
              return () => unsub();
          }, [isLoggedIn, searchName, user]);

          // ✅ 儲存寄件資訊
          const saveShippingProfile = async () => {
              const name = searchName.trim();
              if (!name) return;
              if (!shippingProfile.receiverName.trim() || !shippingProfile.phone.trim() || !shippingProfile.store.trim()) {
                  showMessage("請填寫完整資訊", 'warn');
                  return;
              }
              setSavingProfile(true);
              try {
                  await setDoc(
                      doc(db, 'artifacts', appId, 'public', 'data', 'customerProfiles', name),
                      {
                          receiverName: shippingProfile.receiverName.trim(),
                          phone: shippingProfile.phone.trim(),
                          store: shippingProfile.store.trim(),
                          updatedAt: new Date().toISOString()
                      },
                      { merge: true }
                  );
                  showMessage("寄件資訊已送出 ✅");
              } catch (err) {
                  console.error("Save profile error:", err);
                  showMessage("儲存失敗，請稍後再試", 'error');
              } finally {
                  setSavingProfile(false);
              }
          };

          // ✅ Bug修復：改善名字比對邏輯，trim + 忽略大小寫雙向比對
          // ✅ 重構：myOrder 拆成「最新訂單」和「歷史訂單」
          // ✅ v4.3：支援合併訂單（mergeGroupId），與賣家端一致
          const { currentOrder, pastOrders } = useMemo(() => {
            if (!isLoggedIn || !searchName.trim()) return { currentOrder: null, pastOrders: [] };
            const sn = searchName.trim().toLowerCase();
            const allItems = [...orders, ...archivedOrders];
            const myItems = allItems.filter(o => (o.customerName || '').trim().toLowerCase() === sn);
            
            if (myItems.length === 0) return { currentOrder: null, pastOrders: [] };

            // ✅ v4.3：有 mergeGroupId 的訂單歸同一張；否則按「日期」分組
            const grouped = {};
            myItems.forEach(o => {
                if (!o.createdAt || !o.createdAt.seconds) return;
                let groupKey;
                if (o.mergeGroupId) {
                    groupKey = `merged__${o.mergeGroupId}`;
                } else {
                    const d = new Date(o.createdAt.seconds * 1000);
                    groupKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                }
                if (!grouped[groupKey]) {
                    grouped[groupKey] = {
                        name: o.customerName,
                        codeGroups: {},
                        itemTotal: 0,
                        finalTotal: 0,
                        status: 'pending',
                        date: o.createdAt,
                        creditApplied: 0,
                        _archived: o._archived,
                        _isMerged: !!o.mergeGroupId
                    };
                }
                const group = grouped[groupKey];
                // ✅ v4.3：合併訂單跨日時，顯示用最早那天
                if (o.createdAt.seconds < group.date.seconds) group.date = o.createdAt;
                if (!group.codeGroups[o.itemCode]) {
                    group.codeGroups[o.itemCode] = { items: [], totalQty: 0, priceStr: o.price };
                }
                group.codeGroups[o.itemCode].items.push(o);
                group.codeGroups[o.itemCode].totalQty += (Number(o.quantity) || 1);
                if (o.status === 'shipped') group.status = 'shipped';
                else if (o.status === 'completed' && group.status !== 'shipped') group.status = 'completed';
                if (o.creditApplied && !group.creditApplied) {
                    group.creditApplied = Number(o.creditApplied) || 0;
                }
                // ✅ 收集訂單上鎖住的促銷快照
                if (o.promoSnapshot && !group.promoSnapshot) {
                    group.promoSnapshot = o.promoSnapshot;
                }
            });

            // 計算每組的小計
            const threshold = storeConfig.freeShippingThreshold || 1500;
            const shippingFeeAmt = storeConfig.shippingFee ?? 38; // ✅ v4.3 動態運費
            const allGroups = Object.values(grouped).map(g => {
                let total = 0;
                const totalQty = Object.values(g.codeGroups).reduce((s, cg) => s + cg.totalQty, 0);
                Object.values(g.codeGroups).forEach(cg => { 
                    cg.subtotal = getBundlePrice(cg.totalQty, cg.priceStr); 
                    total += cg.subtotal; 
                });
                g.itemTotal = total;
                g.hasShippingFee = g.itemTotal < threshold && g.itemTotal > 0;
                g.shippingFeeAmt = shippingFeeAmt;
                const baseTotal = g.hasShippingFee ? g.itemTotal + shippingFeeAmt : g.itemTotal;
                // ✅ 促銷折扣（優先用訂單鎖住的快照，日期過了也不變）
                let usedPromo = null;
                if (g.promoSnapshot && g.promoSnapshot.enabled) {
                    usedPromo = g.promoSnapshot;
                } else if (promotion && promotion.enabled) {
                    const orderTime = g.date?.seconds ? new Date(g.date.seconds * 1000) : new Date();
                    if ((!promotion.startAt || new Date(promotion.startAt) <= orderTime) &&
                        (!promotion.endAt   || new Date(promotion.endAt)   >= orderTime)) {
                        usedPromo = promotion;
                    }
                }
                const isLocked = !!(g.promoSnapshot && g.promoSnapshot.enabled);
                g.promoDiscount = usedPromo ? calcDiscount(usedPromo, g.codeGroups, isLocked) : 0;
                g.promoName = usedPromo ? (usedPromo.name || '促銷折扣') : '';
                g.creditApplied = g.creditApplied || 0;
                g.finalTotal = Math.max(0, baseTotal - g.promoDiscount - g.creditApplied);
                g.creditBalance = storeCredits[g.name]?.balance || 0;
                return g;
            }).sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0)); // 新到舊

            return {
                currentOrder: allGroups[0] || null,
                pastOrders: allGroups.slice(1)
            };
          }, [isLoggedIn, orders, archivedOrders, searchName, storeConfig.freeShippingThreshold, storeConfig.shippingFee, storeCredits, promotion]);

          // ✅ 為了相容舊代碼，保留 myOrder 變數
          const myOrder = currentOrder;

          // ✅ 登入時如果最新一筆訂單還「待結帳」（下單後沒完成匯款/賣貨便就跳出去了），
          // 直接跳到我的訂單頁提醒她繼續完成付款，不用等她自己想到要去查
          const _remindedPendingRef = useRef(false);
          useEffect(() => {
              if (!isLoggedIn || !dataLoaded || _remindedPendingRef.current) return;
              _remindedPendingRef.current = true;
              if (myOrder && myOrder.status === 'pending') {
                  setTab('orders');
                  setCurrentPage('order');
                  showMessage('您有一筆訂單還沒完成付款，記得去結帳唷 💳', 'warn');
              }
          }, [isLoggedIn, dataLoaded, myOrder]);

          // ✅ 回報官方賴功能（修正 LINE 連結格式）
          const handleLineReport = () => {
              if (!myOrder) return;
              const itemList = Object.entries(myOrder.codeGroups)
                  .map(([code, cg]) => `${code} x${cg.totalQty}`)
                  .join('、');
              const statusText = myOrder.status === 'shipped' ? '已寄出' : 
                                 myOrder.status === 'completed' ? '已付款' : '已下單';
              const msg = `Hi～我是 ${myOrder.name} 🙌\n已完成下單囉！\n\n品項：${itemList}\n金額：$${myOrder.finalTotal}`;
              const encoded = encodeURIComponent(msg);
              // ✅ 修正：LINE 官方帳號連結需加 @ 前綴
              window.open(`https://line.me/R/oaMessage/@${LINE_OA_ID}/?${encoded}`, '_blank', 'noopener,noreferrer');
              showMessage("已為您開啟 LINE ✨");
          };

          // ✅ Bug修復：安全開啟賣貨便網址（防止 javascript: / data: 等協議注入）
          const handleGoToMyship = () => {
              const url = (storeConfig.myshipUrl || '').trim();
              if (!url) {
                  showMessage("賣貨便網址尚未設定", 'warn');
                  return;
              }
              // 驗證只允許 http/https 協議
              if (!/^https?:\/\//i.test(url)) {
                  showMessage("網址格式錯誤，請聯繫賣家", 'error');
                  return;
              }
              window.open(url, '_blank', 'noopener,noreferrer');
          };

          // ═══ 選購頁邏輯 ═══
          const liveProducts = useMemo(() => products.filter(p => p.active !== false), [products]);
          const categories = useMemo(() => {
              const set = new Set();
              liveProducts.forEach(p => { if (p.category && p.category.trim()) set.add(p.category.trim()); });
              return ['全部', ...Array.from(set)];
          }, [liveProducts]);
          const shownProducts = useMemo(() => {
              const q = shopSearch.trim().toLowerCase();
              return liveProducts.filter(p => {
                  if (activeCat !== '全部' && (p.category || '').trim() !== activeCat) return false;
                  if (q) {
                      const hay = `${p.name || ''} ${p.code || ''} ${p.category || ''}`.toLowerCase();
                      if (!hay.includes(q)) return false;
                  }
                  return true;
              });
          }, [liveProducts, activeCat, shopSearch]);

          const cartItems = useMemo(() => Object.values(cart), [cart]);
          const cartCount = useMemo(() => cartItems.reduce((s, i) => s + i.qty, 0), [cartItems]);
          const cartTotal = useMemo(() => cartItems.reduce((s, i) => s + Number(i.product.price || 0) * i.qty, 0), [cartItems]);

          const startAdd = (product) => {
              // ✅ 有設定庫存且已賣完，不能再加購
              if (product.stock != null && product.stock <= 0) {
                  showMessage('這個商品已經售完囉', 'warn');
                  return;
              }
              // ✅ 未登入（商品連結進來）→ 記住想加的商品，先要求輸入名字
              if (!isLoggedIn) {
                  setPendingAdd(product);
                  setBrowseMode(false); // 顯示名字輸入
                  setDetailProduct(null);
                  return;
              }
              const sizes = parseOptions(product.sizes);
              const colors = parseOptions(product.colors);
              if (sizes.length === 0 && colors.length === 0) { addToCart(product, ''); return; }
              setPickSize(sizes.length ? '' : '_none');
              setPickColor(colors.length ? '' : '_none');
              setSpecModal({ product });
          };
          const confirmSpec = () => {
              const p = specModal.product;
              const sizes = parseOptions(p.sizes);
              const colors = parseOptions(p.colors);
              if (sizes.length && !pickSize) { showMessage('請選擇尺寸', 'warn'); return; }
              if (colors.length && !pickColor) { showMessage('請選擇顏色', 'warn'); return; }
              const parts = [];
              if (pickSize && pickSize !== '_none') parts.push(pickSize);
              if (pickColor && pickColor !== '_none') parts.push(pickColor);
              addToCart(p, parts.join(' '));
              setSpecModal(null);
          };
          const addToCart = (product, spec) => {
              const key = `${product.id}__${spec}`;
              const currentQty = cart[key]?.qty || 0;
              if (product.stock != null && currentQty + 1 > product.stock) {
                  showMessage(`「${product.name}」庫存只剩 ${product.stock} 件囉`, 'warn');
                  return;
              }
              setCart(prev => {
                  const cur = prev[key];
                  return { ...prev, [key]: { product, spec, qty: (cur?.qty || 0) + 1 } };
              });
              showMessage(`已加入 ${product.name}${spec ? ` (${spec})` : ''}`);
          };
          const changeQty = (key, delta) => {
              setCart(prev => {
                  const cur = prev[key];
                  if (!cur) return prev;
                  const q = cur.qty + delta;
                  if (q <= 0) { const n = { ...prev }; delete n[key]; return n; }
                  if (delta > 0 && cur.product.stock != null && q > cur.product.stock) {
                      showMessage(`「${cur.product.name}」庫存只剩 ${cur.product.stock} 件囉`, 'warn');
                      return prev;
                  }
                  return { ...prev, [key]: { ...cur, qty: q } };
              });
          };
          const openConfirm = () => {
              if (!searchName.trim()) { showMessage('請先在上方輸入名字', 'warn'); return; }
              if (cartItems.length === 0) { showMessage('購物車是空的', 'warn'); return; }
              // ✅ 下單前一定要先綁定 LINE，這樣賣家才看得到客人真實身份、也能主動推播通知
              if (!lineProfile || !lineProfile.userId) { showMessage('請先綁定 LINE 才能下單喔', 'warn'); return; }
              setShowConfirm(true);
          };
          // ✅ 送出訂單（欄位與賣家後台一致）。有設定庫存的商品用交易確保不會超賣
          const submitOrder = async () => {
              if (!searchName.trim()) { showMessage('請先輸入名字', 'warn'); return; }
              if (cartItems.length === 0) return;
              // ✅ 保險起見在真正送單前再檢查一次，避免繞過確認畫面直接觸發
              if (!lineProfile || !lineProfile.userId) { showMessage('請先綁定 LINE 才能下單喔', 'warn'); return; }
              setSubmitting(true);
              try {
                  const name = searchName.trim();
                  const stockLimitedItems = cartItems.filter(i => i.product.stock != null);
                  const creditRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeCredits', name);
                  let creditApplied = 0;
                  await runTransaction(db, async (tx) => {
                      // ✅ Firestore 交易規定：所有 read 要先做完才能開始 write
                      const newStockByProductId = {};
                      for (const item of stockLimitedItems) {
                          const pRef = doc(db, 'artifacts', appId, 'public', 'data', 'shopProducts', item.product.id);
                          const snap = await tx.get(pRef);
                          if (!snap.exists()) throw new Error(`商品「${item.product.name}」已下架，請移除後再結帳`);
                          const currentStock = Number(snap.data().stock ?? 0);
                          const already = newStockByProductId[item.product.id]?.needed || 0;
                          const needed = already + item.qty;
                          if (needed > currentStock) throw new Error(`「${item.product.name}」庫存只剩 ${currentStock} 件，不夠您選購的數量，請調整後再試`);
                          newStockByProductId[item.product.id] = { ref: pRef, currentStock, needed };
                      }
                      // ✅ 自動折抵購物金：讀取目前餘額，最多折到商品小計為止（跟後台手動折抵的上限一致）
                      const creditSnap = await tx.get(creditRef);
                      const currentBalance = creditSnap.exists() ? (creditSnap.data().balance || 0) : 0;
                      const currentHistory = creditSnap.exists() ? (creditSnap.data().history || []) : [];
                      creditApplied = Math.max(0, Math.min(currentBalance, cartTotal));

                      Object.values(newStockByProductId).forEach(({ ref, currentStock, needed }) => {
                          tx.update(ref, { stock: currentStock - needed });
                      });
                      cartItems.forEach((item, idx) => {
                          const ref = doc(ordersCol());
                          tx.set(ref, {
                              customerName: name,
                              itemCode: (item.product.code || item.product.name || '').toUpperCase(),
                              spec: item.spec || '',
                              quantity: item.qty,
                              price: String(item.product.price || 0),
                              status: 'pending',
                              customerLineId: '',
                              stockStatus: 'none',
                              source: 'shop',
                              productName: item.product.name || '',
                              creditApplied: idx === 0 ? creditApplied : 0,
                              createdAt: serverTimestamp()
                          });
                      });
                      if (creditApplied > 0) {
                          const newBalance = currentBalance - creditApplied;
                          tx.set(creditRef, {
                              balance: newBalance,
                              history: [...currentHistory, {
                                  time: new Date().toISOString(), amount: -creditApplied,
                                  note: '訂單自動折抵', balanceAfter: newBalance
                              }].slice(-50)
                          });
                      }
                  });
                  // ✅ 記下這次下單摘要，供「通知賣家」使用
                  const summaryList = cartItems.map(i => `${i.product.name}${i.spec ? ` (${i.spec})` : ''} x${i.qty}`).join('\n');
                  setJustOrdered({ name, list: summaryList, total: Math.max(0, cartTotal - creditApplied) });
                  setCart({});
                  setShowConfirm(false);
                  try { localStorage.setItem(NAME_KEY, name); } catch {}
                  showMessage(creditApplied > 0 ? `下單完成！已自動折抵 $${creditApplied} 購物金 💕` : '下單完成！已進入我的訂單 💕');
                  setTab('orders'); // ✅ 下單後直接切到我的訂單
                  setCurrentPage('order');
              } catch (err) {
                  console.error('送單失敗:', err);
                  showMessage(err.message && err.message.includes('庫存') ? err.message : '送出失敗，請稍後再試', 'error');
              } finally { setSubmitting(false); }
          };

          // ✅ v5.6: 拆紅包（用 LINE userId 判斷是否已拆過，避免換暱稱重複拆）
          const claimRedPacket = async () => {
              if (!redPacketData || !searchName.trim()) return;
              if (!lineProfile || !lineProfile.userId) {
                  showMessage('請先綁定 LINE 才能拆紅包', 'warn');
                  return;
              }
              setRedPacketClaiming(true);
              try {
                  const rpRef = doc(db, 'artifacts', appId, 'public', 'data', 'redPackets', redPacketData.id);
                  const name = searchName.trim();
                  const result = await runTransaction(db, async (tx) => {
                      const snap = await tx.get(rpRef);
                      if (!snap.exists()) throw new Error('這個紅包活動不存在');
                      const data = snap.data();
                      const claimedBy = data.claimedBy || {};
                      // ✅ 用 LINE userId 當唯一身份，換暱稱也擋得住重複拆
                      const existing = Object.values(claimedBy).find(info => info.lineUserId === lineProfile.userId);
                      if (existing) return { amount: existing.amount, alreadyClaimed: true };
                      if (!data.active || data.remainingCount <= 0) throw new Error('這個紅包活動已經結束囉');

                      // ✅ 雙倍均值法：跟 LINE／微信紅包一樣的隨機演算法，公平又隨機
                      let amount;
                      if (data.remainingCount === 1) {
                          amount = data.remainingBudget;
                      } else {
                          const maxClaim = Math.max(1, Math.min(
                              data.remainingBudget - (data.remainingCount - 1),
                              Math.floor((data.remainingBudget / data.remainingCount) * 2)
                          ));
                          amount = Math.max(1, Math.floor(Math.random() * maxClaim) + 1);
                      }

                      // ✅ Firestore 交易規定：所有 read 都要在任何 write 之前執行完，
                      // 所以購物金這筆讀取要提到紅包 update 寫入之前
                      const creditRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeCredits', name);
                      const creditSnap = await tx.get(creditRef);
                      const currentBalance = creditSnap.exists() ? (creditSnap.data().balance || 0) : 0;
                      const currentHistory = creditSnap.exists() ? (creditSnap.data().history || []) : [];
                      const newBalance = currentBalance + amount;

                      tx.update(rpRef, {
                          remainingCount: data.remainingCount - 1,
                          remainingBudget: data.remainingBudget - amount,
                          claimedBy: { ...claimedBy, [name]: { amount, lineUserId: lineProfile.userId, claimedAt: Date.now() } }
                      });

                      tx.set(creditRef, {
                          balance: newBalance,
                          history: [...currentHistory, {
                              time: new Date().toISOString(), amount,
                              note: `紅包活動：${data.name}`, balanceAfter: newBalance
                          }].slice(-50)
                      });

                      return { amount, alreadyClaimed: false };
                  });
                  setRedPacketResult(result);
                  if (!result.alreadyClaimed) showMessage(`🎉 拆到 $${result.amount} 購物金！`);
              } catch (err) {

                  showMessage(err.message || '拆紅包失敗，請稍後再試', 'error');

                                        <button key={c} onClick={() => setPickColor(c)} className={`px-4 py-2.5 rounded-xl text-[13px] font-bold transition-all ${pickColor === c ? 'bg-[#333] text-white shadow-md' : 'bg-[#F5F1EA] text-[#555]'}`}>{c}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                        <button onClick={confirmSpec} className="w-full py-4 bg-[#B8A582] text-white rounded-2xl text-sm font-black active:scale-95 transition-all flex items-center justify-center gap-2 shadow-md">
                            <Plus size={16}/> 加入
                        </button>
                    </div>
                </div>
              )}

              {/* 確認訂單 Modal */}
              {showConfirm && (
                <div className="fixed inset-0 z-[85] flex items-end justify-center bg-stone-900/50 backdrop-blur-sm animate-in" onClick={() => !submitting && setShowConfirm(false)}>
                    <div className="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 pb-8 max-h-[88vh] overflow-y-auto scrollbar-hide" onClick={e => e.stopPropagation()}>
                        <div className="w-9 h-1 bg-[#EDE6DA] rounded-full mx-auto mb-5"/>
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-lg font-black text-[#3A3A3A]">確認您的訂單</h3>
                            <button onClick={() => !submitting && setShowConfirm(false)} className="text-[#888]"><X size={20}/></button>
                        </div>
                        <div className="bg-[#F5F1EA] rounded-2xl px-4 py-3 mb-4 flex items-center gap-2">
                            <User size={14} className="text-[#B8A582]"/>
                            <span className="text-[13px] font-bold text-[#3A3A3A]">{searchName.trim()}</span>
                        </div>
                        <div className="space-y-3 mb-4">
                            {cartItems.map((item, idx) => {
                                const key = `${item.product.id}__${item.spec}`;
                                return (
                                    <div key={idx} className="flex items-center gap-3 bg-white rounded-2xl p-3 border border-[#EDE6DA]">
                                        <div className="w-14 h-14 rounded-xl bg-[#F5F1EA] overflow-hidden flex items-center justify-center shrink-0">
                                            {item.product.image ? <img src={item.product.image} className="w-full h-full object-cover"/> : <ShoppingBag size={18} className="text-[#C9BCA8]"/>}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-[13px] text-[#3A3A3A] truncate">{item.product.name}</div>
                                            {item.spec && <div className="text-[11px] text-[#888] font-bold">{item.spec}</div>}
                                            <div className="serif-number text-[15px] text-[#B8A582]">${Number(item.product.price).toLocaleString()}</div>
                                        </div>
                                        <div className="flex items-center gap-2 shrink-0">
                                            <button onClick={() => changeQty(key, -1)} className="w-7 h-7 rounded-full bg-[#F5F1EA] flex items-center justify-center text-[#555] active:scale-90"><Minus size={14}/></button>
                                            <span className="font-black text-sm w-5 text-center">{item.qty}</span>
                                            <button onClick={() => changeQty(key, 1)} className="w-7 h-7 rounded-full bg-[#333] flex items-center justify-center text-white active:scale-90"><Plus size={14}/></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-between items-end pt-4 border-t border-dashed border-[#DDD2BE] mb-2">
                            <span className="text-[11px] font-black text-[#6B6B6B] uppercase tracking-[0.2em] mb-1">合計</span>
                            <span className="serif-number text-4xl text-[#B8A582] leading-none">${cartTotal.toLocaleString()}</span>
                        </div>
                        {(() => {
                            const previewCredit = Math.max(0, Math.min(storeCredits[searchName.trim()]?.balance || 0, cartTotal));
                            return previewCredit > 0 ? (
                                <div className="flex justify-between items-center mb-5 px-1">
                                    <span className="text-[11px] font-bold text-[#B8A582] flex items-center gap-1">
                                        <Gift size={11}/> 自動折抵購物金
                                    </span>
                                    <span className="serif-number text-lg text-[#B8A582]">-${previewCredit.toLocaleString()}</span>
                                </div>
                            ) : <div className="mb-5"/>;
                        })()}
                        <div className="bg-[#EDE2CC] rounded-xl px-4 py-2.5 mb-4 border border-[#C9B88A]">
                            <p className="text-[10px] text-[#8A6D3B] font-bold leading-relaxed">💡 送出後可在「我的訂單」查看，運費與優惠將由賣家為您結算</p>
                        </div>
                        <button onClick={submitOrder} disabled={submitting} className="w-full py-4 bg-[#333] text-white rounded-2xl text-sm font-black active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-60">
                            {submitting ? <><Loader2 size={16} className="animate-spin"/> 送出中...</> : <><Check size={16}/> 確認送出訂單</>}
                        </button>
                    </div>
                </div>
              )}

              {/* ✅ v5.6: 拆紅包 Modal */}
              {_urlRedPacket && isLoggedIn && (
                <div className="fixed inset-0 z-[90] flex items-center justify-center p-6 bg-stone-900/60 backdrop-blur-sm animate-in">
                    <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl text-center space-y-5 relative">
                        <button onClick={() => { window.history.replaceState({}, '', window.location.origin + window.location.pathname); window.location.reload(); }}
                            className="absolute right-6 top-6 text-[#888888] hover:text-[#3A3A3A]">
                            <X size={20}/>
                        </button>

                        {!redPacketLoaded ? (
                            <div className="py-8">
                                <Loader2 size={28} className="mx-auto text-[#B55550] animate-spin"/>
                                <p className="text-xs font-bold text-[#6B6B6B] mt-3">載入紅包中...</p>
                            </div>
                        ) : !redPacketData ? (
                            <div className="py-6 space-y-3">
                                <AlertTriangle size={28} className="mx-auto text-[#888888]"/>
                                <p className="text-sm font-bold text-[#555555]">這個紅包活動不存在或已被刪除</p>
                            </div>
                        ) : redPacketResult ? (
                            <div className="py-4 space-y-4 animate-in">
                                <div className="w-20 h-20 mx-auto rounded-full bg-[#FFF3E0] flex items-center justify-center">
                                    <Gift size={36} className="text-[#B55550]"/>
                                </div>
                                <div>
                                    <h3 className="text-lg font-black text-[#3A3A3A]">
                                        {redPacketResult.alreadyClaimed ? '你已經拆過這個紅包囉' : '恭喜你！🎉'}
                                    </h3>
                                    <p className="text-[12px] text-[#6B6B6B] font-bold mt-2">
                                        {redPacketResult.alreadyClaimed ? '之前拆到的金額是' : '拆到了'}
                                    </p>
                                </div>
                                <div className="serif-number text-6xl text-[#B55550] leading-none">${redPacketResult.amount}</div>
                                <p className="text-[11px] text-[#888888] font-bold">已經加進你的購物金餘額，下次消費可以折抵 💕</p>
                                <button onClick={() => { window.history.replaceState({}, '', window.location.origin + window.location.pathname); window.location.reload(); }}
                                    className="w-full py-4 bg-[#333] text-white rounded-2xl text-sm font-black active:scale-95 transition-all mt-2">
                                    知道了，去逛逛
                                </button>
                            </div>
                        ) : !lineProfile || !lineProfile.userId ? (
                            <div className="py-4 space-y-4">
                                <div className="w-20 h-20 mx-auto rounded-full bg-[#EAF7EE] flex items-center justify-center">
                                    <MessageCircle size={32} className="text-[#2E7D46]"/>
                                </div>
                                <div>
                                    <h3 className="text-lg font-black text-[#3A3A3A]">{redPacketData.name}</h3>
                                    <p className="text-[12px] text-[#6B6B6B] font-bold mt-2 leading-relaxed">請先用 LINE 登入才能拆這個紅包<br/>（避免同一人重複拆）</p>
                                </div>
                                <button onClick={startLineLogin}
                                    className="line-btn w-full py-4 text-white rounded-2xl text-sm font-black shadow-md active:scale-95 transition-all flex items-center justify-center gap-2">
                                    <MessageCircle size={16}/> 使用 LINE 登入
                                </button>
                            </div>
                        ) : (!redPacketData.active || redPacketData.remainingCount <= 0) ? (
                            <div className="py-6 space-y-3">
                                <Gift size={28} className="mx-auto text-[#888888]"/>
                                <p className="text-sm font-bold text-[#555555]">這個紅包已經被搶完囉，下次手腳要快一點 😢</p>
                            </div>
                        ) : (
                            <div className="py-4 space-y-4">
                                <div className="w-24 h-24 mx-auto rounded-full bg-gradient-to-br from-[#B55550] to-[#E07B00] flex items-center justify-center shadow-lg">
                                    <Gift size={44} className="text-white"/>
                                </div>
                                <div>
                                    <h3 className="text-lg font-black text-[#3A3A3A]">{redPacketData.name}</h3>
                                    <p className="text-[12px] text-[#6B6B6B] font-bold mt-2">
                                        Hi {searchName}，還剩 {redPacketData.remainingCount} 張，手氣不錯就點下去拆！
                                    </p>
                                </div>
                                <button onClick={claimRedPacket} disabled={redPacketClaiming}
                                    className="w-full py-5 bg-gradient-to-r from-[#B55550] to-[#E07B00] text-white rounded-2xl text-base font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-60">
                                    {redPacketClaiming ? <><Loader2 size={18} className="animate-spin"/> 拆開中...</> : <><Gift size={18}/> 拆紅包</>}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
              )}

              <div className="fixed bottom-2 w-full text-center opacity-10 text-[9px] font-bold tracking-widest pointer-events-none text-[#3A3A3A]">Fann.Beauty · 官網</div>
            </div>
          );
        };

        // ═══ 選購分頁元件 ═══
        const ShopTab = ({ productsLoaded, liveProducts, shownProducts, categories, activeCat, setActiveCat, shopSearch, setShopSearch, setDetailProduct, startAdd, cartItems, parseOptions }) => {
            if (!productsLoaded) return (
                <div className="text-center py-16"><Loader2 size={26} className="mx-auto text-[#B8A582] animate-spin"/><p className="text-xs font-bold text-[#6B6B6B] mt-3 pulse-soft">載入商品中...</p></div>
            );
            if (liveProducts.length === 0) return (
                <div className="text-center py-16 text-[#6B6B6B]"><Package size={30} className="mx-auto mb-3 text-[#C9BCA8]"/><p className="text-xs font-bold">目前沒有主打商品，敬請期待 ♡</p></div>
            );
            return (
                <div className="space-y-5 animate-in">
                    <div className="relative">
                        <Search size={15} className="absolute left-4 top-1/2 -translate-y-1/2 text-[#B8A582]"/>
                        <input value={shopSearch} onChange={e => setShopSearch(e.target.value)} placeholder="搜尋商品名稱或代碼..."
                            className="w-full pl-11 pr-10 py-3 bg-white rounded-full text-[13px] font-bold outline-none focus:ring-2 ring-[#EDE6DA] border border-white shadow-sm"/>
                        {shopSearch && <button onClick={() => setShopSearch('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-[#888]"><X size={15}/></button>}
                    </div>
                    {categories.length > 1 && (
                        <div className="flex gap-2 overflow-x-auto scrollbar-hide -mx-1 px-1 py-1">
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setActiveCat(cat)} className={`shrink-0 px-4 py-2 rounded-full text-[12px] font-black transition-all ${activeCat === cat ? 'bg-[#333] text-white shadow-md' : 'bg-white text-[#888] border border-[#EDE6DA]'}`}>{cat}</button>
                            ))}
                        </div>
                    )}
                    {shownProducts.length === 0 ? (
                        <div className="text-center py-14 text-[#6B6B6B]"><Search size={26} className="mx-auto mb-2 text-[#C9BCA8]"/><p className="text-xs font-bold">找不到符合的商品</p></div>
                    ) : (
                        <div className="grid grid-cols-2 gap-4">
                            {shownProducts.map(p => {
                                const inCart = cartItems.filter(i => i.product.id === p.id).reduce((s, i) => s + i.qty, 0);
                                const soldOut = p.stock != null && p.stock <= 0;
                                return (
                                    <div key={p.id} className={`bg-white rounded-[1.5rem] overflow-hidden shadow-sm border border-white flex flex-col ${soldOut ? 'opacity-60' : ''}`}>
                                        <button onClick={() => setDetailProduct(p)} className="aspect-square bg-[#F5F1EA] flex items-center justify-center overflow-hidden relative">
                                            {p.image ? <img src={p.image} alt={p.name} loading="lazy" className="w-full h-full object-cover"/> : <ShoppingBag size={32} className="text-[#C9BCA8]"/>}
                                            {p.category && <span className="absolute top-2 left-2 bg-white/85 text-[#8A6D3B] text-[9px] font-black px-2 py-0.5 rounded-full">{p.category}</span>}
                                            {soldOut && (
                                                <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                                                    <span className="bg-white/90 text-[#B55550] text-[11px] font-black px-3 py-1.5 rounded-full tracking-widest">已售完</span>
                                                </div>
                                            )}
                                        </button>
                                        <div className="p-3 flex-1 flex flex-col">
                                            <button onClick={() => setDetailProduct(p)} className="text-left font-bold text-[13px] text-[#3A3A3A] leading-tight line-clamp-2">{p.name}</button>
                                            {(parseOptions(p.sizes).length > 0 || parseOptions(p.colors).length > 0) && (
                                                <div className="text-[10px] text-[#888] font-bold mt-0.5">{[...parseOptions(p.sizes), ...parseOptions(p.colors)].join(' · ')}</div>
                                            )}
                                            <div className="serif-number text-lg text-[#B8A582] mt-1.5">${Number(p.price).toLocaleString()}</div>
                                            {!soldOut && p.stock != null && (
                                                <div className={`text-[9px] font-bold mt-0.5 ${p.stock <= 5 ? 'text-[#E07B00]' : 'text-[#888]'}`}>剩 {p.stock} 件</div>
                                            )}
                                            <button onClick={() => startAdd(p)} disabled={soldOut}
                                                className="mt-2 w-full py-2.5 bg-[#B8A582] text-white rounded-xl text-[12px] font-black flex items-center justify-center gap-1 active:scale-95 transition-all shadow-sm disabled:bg-[#DDD2BE] disabled:cursor-not-allowed disabled:active:scale-100">
                                                {soldOut ? '已售完' : <><Plus size={14}/> {inCart > 0 ? `已選 ${inCart}` : '選購'}</>}
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
